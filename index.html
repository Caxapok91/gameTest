<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Runner - Бесконечный бегун (исправленный прыжок)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border-radius: 20px;
            min-width: 400px;
        }
        
        #restart-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #restart-btn:hover {
            transform: scale(1.05);
            background: #45a049;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 8px;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 8px;
            z-index: 100;
            font-family: monospace;
            text-align: right;
            pointer-events: none;
        }
        
        @media (max-width: 600px) {
            #game-over { font-size: 32px; min-width: 280px; padding: 20px; }
            #score { font-size: 24px; }
            #instructions, #controls-hint { font-size: 10px; padding: 8px; }
        }
    </style>
</head>
<body>
    <div id="score">Счет: 0</div>
    <div id="game-over">
        ИГРА ОКОНЧЕНА<br>
        <span id="final-score">0</span>
        <br>
        <button id="restart-btn">Начать заново</button>
    </div>
    <div id="instructions">
        🎮 Управление:<br>
        ⬅️ ➡️ - движение влево/вправо<br>
        ⬆️ / SPACE - прыжок (только игрок)
    </div>
    <div id="controls-hint">
        💡 Советы:<br>
        • Уворачивайся от красных кубиков<br>
        • Собирай золотые монеты<br>
        • Прыгай, чтобы избегать препятствий
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 25, 60);

        // Камера (фиксированная, не двигается при прыжке)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3.5, 9);
        
        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, 2, 0);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.4);
        backLight.position.set(0, 3, -5);
        scene.add(backLight);
        
        // Динамическая дорога
        const roadSegments = [];
        const SEGMENT_LENGTH = 2.5;
        const SEGMENT_COUNT = 25;
        
        class RoadSegment {
            constructor(z) {
                this.z = z;
                this.group = new THREE.Group();
                
                const roadMat = new THREE.MeshStandardMaterial({ color: 0x2d2d3d, roughness: 0.7 });
                const road = new THREE.Mesh(new THREE.PlaneGeometry(4.5, SEGMENT_LENGTH), roadMat);
                road.rotation.x = -Math.PI / 2;
                road.position.y = -0.5;
                road.receiveShadow = true;
                this.group.add(road);
                
                // Разметка полос
                const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffaa });
                for (let i = -1.8; i <= 1.8; i += 0.9) {
                    const line = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 0.3), lineMat);
                    line.position.set(i, -0.45, 0);
                    line.castShadow = true;
                    this.group.add(line);
                }
                
                // Бордюры
                const curbMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
                const leftCurb = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, SEGMENT_LENGTH), curbMat);
                leftCurb.position.set(-2.4, -0.4, 0);
                leftCurb.castShadow = true;
                this.group.add(leftCurb);
                
                const rightCurb = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, SEGMENT_LENGTH), curbMat);
                rightCurb.position.set(2.4, -0.4, 0);
                rightCurb.castShadow = true;
                this.group.add(rightCurb);
                
                this.group.position.z = z;
                scene.add(this.group);
            }
            
            update(z) {
                this.group.position.z = z;
            }
            
            remove() {
                scene.remove(this.group);
            }
        }
        
        // Создаем сегменты дороги
        for (let i = 0; i < SEGMENT_COUNT; i++) {
            roadSegments.push(new RoadSegment(-i * SEGMENT_LENGTH));
        }
        
        // Деревья
        const trees = [];
        class MovingTree {
            constructor(x, z) {
                const group = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.38, 0.9), new THREE.MeshStandardMaterial({ color: 0x8B4513 }));
                trunk.position.y = 0;
                trunk.castShadow = true;
                group.add(trunk);
                
                const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.5, 0.8, 8), new THREE.MeshStandardMaterial({ color: 0x228B22 }));
                foliage1.position.y = 0.65;
                foliage1.castShadow = true;
                group.add(foliage1);
                
                const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.6, 8), new THREE.MeshStandardMaterial({ color: 0x32CD32 }));
                foliage2.position.y = 1.1;
                foliage2.castShadow = true;
                group.add(foliage2);
                
                group.position.set(x, -0.5, z);
                scene.add(group);
                this.group = group;
                this.z = z;
            }
            
            update(z) {
                this.group.position.z = z;
            }
            
            remove() {
                scene.remove(this.group);
            }
        }
        
        // Создаем деревья
        for (let i = -20; i <= 20; i += 3) {
            trees.push(new MovingTree(-3.4, i));
            trees.push(new MovingTree(3.4, i));
        }
        
        // Игрок (теперь прыгает только он, камера не двигается)
        const playerGroup = new THREE.Group();
        const playerBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.7, 0.7, 0.7),
            new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0x442200, metalness: 0.7 })
        );
        playerBody.castShadow = true;
        playerGroup.add(playerBody);
        
        // Глаза
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.12), eyeMat);
        leftEye.position.set(-0.22, 0.22, 0.36);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.12), eyeMat);
        rightEye.position.set(0.22, 0.22, 0.36);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07), pupilMat);
        leftPupil.position.set(-0.22, 0.19, 0.47);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07), pupilMat);
        rightPupil.position.set(0.22, 0.19, 0.47);
        playerGroup.add(leftEye);
        playerGroup.add(rightEye);
        playerGroup.add(leftPupil);
        playerGroup.add(rightPupil);
        
        // Шарф
        const scarfMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
        const scarf = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.15, 0.1), scarfMat);
        scarf.position.set(0, -0.2, 0.35);
        playerGroup.add(scarf);
        
        scene.add(playerGroup);
        playerGroup.position.set(0, 0, 1);
        
        // Препятствия
        class Obstacle {
            constructor(x, z) {
                const geometry = new THREE.BoxGeometry(0.65, 0.65, 0.65);
                const material = new THREE.MeshStandardMaterial({ color: 0xFF3333, emissive: 0x330000 });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, 0, z);
                this.mesh.castShadow = true;
                scene.add(this.mesh);
                this.active = true;
            }
            
            update(z) {
                if (this.active) {
                    this.mesh.position.z = z;
                    this.mesh.rotation.x += 0.05;
                    this.mesh.rotation.z += 0.04;
                    this.mesh.rotation.y += 0.03;
                }
            }
            
            getZ() {
                return this.mesh.position.z;
            }
            
            getX() {
                return this.mesh.position.x;
            }
            
            remove() {
                scene.remove(this.mesh);
                this.active = false;
            }
        }
        
        // Монеты
        class Coin {
            constructor(x, z) {
                const geometry = new THREE.SphereGeometry(0.28, 16, 16);
                const material = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0x442200 });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, 0.35, z);
                this.mesh.castShadow = true;
                scene.add(this.mesh);
                this.active = true;
                this.offset = Math.random() * Math.PI * 2;
            }
            
            update(z) {
                if (this.active) {
                    this.mesh.position.z = z;
                    this.mesh.rotation.y += 0.1;
                    this.mesh.position.y = 0.35 + Math.sin(Date.now() * 0.008 + this.offset) * 0.12;
                }
            }
            
            getZ() {
                return this.mesh.position.z;
            }
            
            getX() {
                return this.mesh.position.x;
            }
            
            remove() {
                scene.remove(this.mesh);
                this.active = false;
            }
        }
        
        // Частицы
        class ParticleSystem {
            constructor() {
                this.particles = [];
            }
            
            addExplosion(position, color) {
                for (let i = 0; i < 20; i++) {
                    const geometry = new THREE.SphereGeometry(0.07, 4, 4);
                    const material = new THREE.MeshStandardMaterial({ color: color });
                    const particle = new THREE.Mesh(geometry, material);
                    particle.position.copy(position);
                    particle.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.35,
                            Math.random() * 0.35,
                            (Math.random() - 0.5) * 0.35
                        ),
                        life: 1
                    };
                    scene.add(particle);
                    this.particles.push(particle);
                }
            }
            
            update() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.userData.life -= 0.02;
                    if (p.userData.life <= 0) {
                        scene.remove(p);
                        this.particles.splice(i, 1);
                    } else {
                        p.position.x += p.userData.velocity.x;
                        p.position.y += p.userData.velocity.y;
                        p.position.z += p.userData.velocity.z;
                        p.material.opacity = p.userData.life;
                        p.material.transparent = true;
                    }
                }
            }
        }
        
        // Игровая логика
        let score = 0;
        let gameRunning = true;
        let scrollSpeed = 0.12;
        let baseSpeed = 0.12;
        let obstacles = [];
        let coins = [];
        let framesSinceLastObstacle = 0;
        let framesSinceLastCoin = 0;
        let jumpVelocity = 0;
        let isJumping = false;
        let playerY = 0;
        let targetPlayerX = 0;
        let currentPlayerX = 0;
        const GRAVITY = 0.022; // Увеличена гравитация для более быстрого падения
        const JUMP_FORCE = 0.4; // Увеличена сила прыжка
        
        // Параметры для движения
        const MOVE_STEP = 0.65;
        const MAX_POSITION = 2.3;
        const MIN_POSITION = -2.3;
        
        const particleSystem = new ParticleSystem();
        
        function updateScoreUI() {
            document.getElementById('score').textContent = `Счет: ${Math.floor(score)}`;
        }
        
        function jump() {
            if (!gameRunning) return;
            if (!isJumping && playerY === 0) {
                isJumping = true;
                jumpVelocity = JUMP_FORCE;
            }
        }
        
        function moveLeft() {
            if (!gameRunning) return;
            targetPlayerX = Math.max(MIN_POSITION, targetPlayerX - MOVE_STEP);
        }
        
        function moveRight() {
            if (!gameRunning) return;
            targetPlayerX = Math.min(MAX_POSITION, targetPlayerX + MOVE_STEP);
        }
        
        function restartGame() {
            obstacles.forEach(obs => obs.remove());
            coins.forEach(coin => coin.remove());
            obstacles = [];
            coins = [];
            
            score = 0;
            scrollSpeed = baseSpeed;
            gameRunning = true;
            playerY = 0;
            isJumping = false;
            jumpVelocity = 0;
            targetPlayerX = 0;
            currentPlayerX = 0;
            playerGroup.position.y = 0;
            playerGroup.position.x = 0;
            framesSinceLastObstacle = 30;
            framesSinceLastCoin = 20;
            
            updateScoreUI();
            document.getElementById('game-over').style.display = 'none';
        }
        
        function checkCollisions() {
            const playerBox = new THREE.Box3().setFromObject(playerGroup);
            
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                if (!obs.active) continue;
                
                const obsBox = new THREE.Box3().setFromObject(obs.mesh);
                if (playerBox.intersectsBox(obsBox)) {
                    gameRunning = false;
                    document.getElementById('final-score').textContent = Math.floor(score);
                    document.getElementById('game-over').style.display = 'block';
                    particleSystem.addExplosion(playerGroup.position, 0xff3333);
                    return;
                }
            }
            
            for (let i = 0; i < coins.length; i++) {
                const coin = coins[i];
                if (!coin.active) continue;
                
                const coinBox = new THREE.Box3().setFromObject(coin.mesh);
                if (playerBox.intersectsBox(coinBox)) {
                    score += 10;
                    updateScoreUI();
                    particleSystem.addExplosion(coin.mesh.position, 0xFFD700);
                    coin.remove();
                    coins.splice(i, 1);
                    i--;
                    
                    scrollSpeed = baseSpeed + Math.floor(score / 150) * 0.015;
                }
            }
        }
        
        function updatePlayer() {
            if (!gameRunning) return;
            
            // Движение влево/вправо
            currentPlayerX += (targetPlayerX - currentPlayerX) * 0.35;
            playerGroup.position.x = currentPlayerX;
            
            // Наклон при движении
            const tiltAmount = currentPlayerX * 0.2;
            playerGroup.rotation.z += (tiltAmount - playerGroup.rotation.z) * 0.2;
            
            // Физика прыжка (только игрок, камера НЕ двигается)
            if (isJumping || playerY > 0) {
                jumpVelocity -= GRAVITY;
                playerY += jumpVelocity;
                
                if (playerY <= 0) {
                    playerY = 0;
                    isJumping = false;
                    jumpVelocity = 0;
                }
                playerGroup.position.y = playerY;
            } else {
                playerGroup.position.y = 0;
            }
            
            // Анимация при прыжке (небольшой наклон)
            if (isJumping) {
                playerGroup.rotation.x = Math.sin(Date.now() * 0.02) * 0.15;
                // Сжатие при прыжке
                const squash = 1 + Math.abs(jumpVelocity) * 0.3;
                playerGroup.scale.y = squash;
                playerGroup.scale.x = 1 - Math.abs(jumpVelocity) * 0.1;
                playerGroup.scale.z = 1 - Math.abs(jumpVelocity) * 0.1;
            } else {
                playerGroup.rotation.x += (0 - playerGroup.rotation.x) * 0.1;
                // Возврат к нормальному размеру
                playerGroup.scale.set(1, 1, 1);
            }
            
            // Камера остается фиксированной, не следит за прыжком
            // Только немного следит за движением влево/вправо для лучшей видимости
            const targetCamX = currentPlayerX * 0.15;
            camera.position.x += (targetCamX - camera.position.x) * 0.1;
            camera.lookAt(currentPlayerX, 0.5, 2);
        }
        
        function updateWorld() {
            if (!gameRunning) return;
            
            const deltaZ = scrollSpeed;
            
            // Обновляем дорогу
            for (let seg of roadSegments) {
                let newZ = seg.group.position.z + deltaZ;
                if (newZ > SEGMENT_LENGTH) {
                    newZ = -SEGMENT_LENGTH * (SEGMENT_COUNT - 1);
                }
                seg.update(newZ);
            }
            
            // Обновляем деревья
            for (let tree of trees) {
                let newZ = tree.group.position.z + deltaZ;
                if (newZ > 8) {
                    newZ = -22;
                }
                tree.update(newZ);
            }
            
            // Обновляем препятствия
            for (let i = 0; i < obstacles.length; i++) {
                const newZ = obstacles[i].getZ() + deltaZ;
                if (newZ > 7) {
                    obstacles[i].remove();
                    obstacles.splice(i, 1);
                    i--;
                } else {
                    obstacles[i].update(newZ);
                }
            }
            
            // Обновляем монеты
            for (let i = 0; i < coins.length; i++) {
                const newZ = coins[i].getZ() + deltaZ;
                if (newZ > 7) {
                    coins[i].remove();
                    coins.splice(i, 1);
                    i--;
                } else {
                    coins[i].update(newZ);
                }
            }
            
            // Спавн препятствий
            framesSinceLastObstacle++;
            if (framesSinceLastObstacle > 65 && gameRunning && obstacles.length < 4) {
                if (Math.random() < 0.45) {
                    const positions = [-2.0, -1.3, -0.6, 0, 0.6, 1.3, 2.0];
                    const pos = positions[Math.floor(Math.random() * positions.length)];
                    obstacles.push(new Obstacle(pos, -12));
                    framesSinceLastObstacle = 0;
                }
            }
            
            // Спавн монет
            framesSinceLastCoin++;
            if (framesSinceLastCoin > 45 && gameRunning && coins.length < 5) {
                if (Math.random() < 0.5) {
                    const positions = [-2.0, -1.3, -0.6, 0, 0.6, 1.3, 2.0];
                    const pos = positions[Math.floor(Math.random() * positions.length)];
                    coins.push(new Coin(pos, -11));
                    framesSinceLastCoin = 0;
                }
            }
            
            // Увеличиваем счет
            score += 0.12;
            updateScoreUI();
        }
        
        // Управление с клавиатуры
        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            Space: false
        };
        
        let moveCooldown = 0;
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (!keys[e.code]) {
                    jump();
                }
                keys[e.code] = true;
            }
            
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                if (!keys.ArrowLeft) {
                    moveLeft();
                    moveCooldown = 0;
                }
                keys.ArrowLeft = true;
            }
            
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                if (!keys.ArrowRight) {
                    moveRight();
                    moveCooldown = 0;
                }
                keys.ArrowRight = true;
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                keys[e.code] = false;
            }
            if (e.code === 'ArrowLeft') {
                keys.ArrowLeft = false;
            }
            if (e.code === 'ArrowRight') {
                keys.ArrowRight = false;
            }
        });
        
        // Автоповтор при удержании
        function handleAutoMove() {
            if (!gameRunning) return;
            moveCooldown++;
            if (moveCooldown > 8) {
                if (keys.ArrowLeft) {
                    moveLeft();
                    moveCooldown = 6;
                }
                if (keys.ArrowRight) {
                    moveRight();
                    moveCooldown = 6;
                }
            }
        }
        
        // Мобильное управление
        let touchStartX = 0;
        
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            if (e.target.id !== 'restart-btn') {
                jump();
            }
        });
        
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchEndX = e.touches[0].clientX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 15) {
                if (diff > 0) {
                    moveRight();
                } else {
                    moveLeft();
                }
                touchStartX = touchEndX;
            }
        }, { passive: false });
        
        window.addEventListener('click', (e) => {
            if (e.target.id !== 'restart-btn') {
                jump();
            }
        });
        
        document.getElementById('restart-btn').addEventListener('click', () => {
            restartGame();
        });
        
        // Стартовые объекты
        setTimeout(() => {
            if (gameRunning) {
                setTimeout(() => coins.push(new Coin(0, -8)), 500);
                setTimeout(() => obstacles.push(new Obstacle(-1.3, -10)), 1500);
                setTimeout(() => coins.push(new Coin(1.3, -9)), 2500);
                setTimeout(() => obstacles.push(new Obstacle(1.3, -11)), 3500);
            }
        }, 1000);
        
        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            
            handleAutoMove();
            
            if (gameRunning) {
                updatePlayer();
                updateWorld();
                checkCollisions();
            }
            
            particleSystem.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Игра запущена! Теперь при прыжке двигается только игрок, камера остается на месте');
    </script>
</body>
</html>
